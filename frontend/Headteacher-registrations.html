<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Headteacher Registrations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(248, 250, 252, 0.2);
      border-radius: 1.5rem;
      box-shadow: 0 25px 45px rgba(15, 23, 42, 0.45);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="panel w-full max-w-5xl p-8 space-y-6">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-semibold">Registrations</h1>
        <p class="text-sm text-slate-300">Headteacher view of registered accounts</p>
      </div>
      <div class="flex gap-3">
        <a href="Headteacher.html" class="px-4 py-2 bg-slate-900 text-white rounded-full font-semibold hover:bg-slate-800 transition flex items-center gap-2">
          <i class="fas fa-arrow-left"></i>
          Back
        </a>
        <button onclick="loadRegistrations()" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-full font-semibold hover:bg-amber-400 transition">Refresh</button>
      </div>
    </div>
    <div class="overflow-auto">
      <table class="w-full text-left text-sm">
        <thead class="text-slate-400 text-xs uppercase tracking-widest">
          <tr>
            <th class="px-3 py-2">Name</th>
            <th class="px-3 py-2">Email</th>
            <th class="px-3 py-2">Role</th>
            <th class="px-3 py-2">Grade</th>
            <th class="px-3 py-2">Joined</th>
            <th class="px-3 py-2">Action</th>
          </tr>
        </thead>
        <tbody id="registrations-body">
          <tr>
            <td colspan="6" class="px-3 py-6 text-center text-slate-400">Loading registrations…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const ADMIN_API_BASE = window.location.hostname === 'localhost' 
        ? "http://localhost:5001/api/admin" 
        : "https://rean-web-3.onrender.com/api/admin";
    const registrationsBody = document.getElementById("registrations-body");

    async function loadRegistrations() {
      registrationsBody.innerHTML = `<tr><td colspan="6" class="px-3 py-6 text-center text-slate-400">Loading registrations…</td></tr>`;
      try {
        const res = await fetch(`${ADMIN_API_BASE}/users`, {
            headers: {
                'x-user-role': localStorage.getItem('reanUserRole') || ''
            }
        });
        const text = await res.text();
        const data = text ? JSON.parse(text) : [];
        if (!res.ok) throw new Error(data.message || "Unable to fetch registrations");
        if (data.length === 0) {
          registrationsBody.innerHTML = `<tr><td colspan="6" class="px-3 py-6 text-center text-slate-400">No registrations yet.</td></tr>`;
          return;
        }
        registrationsBody.innerHTML = data.map(user => `
          <tr class="border-t border-slate-800">
            <td class="px-3 py-3 font-semibold">${user.full_name}</td>
            <td class="px-3 py-3 text-slate-300">${user.email}</td>
            <td class="px-3 py-3 text-slate-300">${user.role}</td>
            <td class="px-3 py-3 text-slate-300">${user.grade_level || '-'}</td>
            <td class="px-3 py-3 text-slate-400">${new Date(user.created_at).toLocaleString()}</td>
            <td class="px-3 py-3"><button onclick="removeRegistration('${user.id}')" class="text-red-400 hover:text-red-200 text-xs font-semibold">Remove</button></td>
          </tr>
        `).join("");
      } catch (err) {
        registrationsBody.innerHTML = `<tr><td colspan="6" class="px-3 py-6 text-center text-red-400">Unable to load registrations.</td></tr>`;
      }
    }

    async function removeRegistration(id) {
      if (!confirm("Remove this registration?")) return;
      try {
        const res = await fetch(`${ADMIN_API_BASE}/users/${id}`, {
            method: "DELETE",
            headers: {
                'x-user-role': localStorage.getItem('reanUserRole') || ''
            }
        });
        const text = await res.text();
        const data = text ? JSON.parse(text) : {};
        if (!res.ok) throw new Error(data.message || "Deletion failed");
        loadRegistrations();
      } catch (err) {
        alert(err.message);
      }
    }

    loadRegistrations();
  </script>
</body>
</html>
